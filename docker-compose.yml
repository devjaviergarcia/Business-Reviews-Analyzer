x-app-env: &app_env
  LANG: ${LANG_DOCKER:-es_ES.UTF-8}
  LC_ALL: ${LC_ALL_DOCKER:-es_ES.UTF-8}
  LANGUAGE: ${LANGUAGE_DOCKER:-es_ES:es}
  TZ: ${TZ_DOCKER:-Europe/Madrid}
  HOST: ${HOST_DOCKER:-0.0.0.0}
  PORT: ${PORT_DOCKER:-8000}
  MONGO_URI: ${MONGO_URI_DOCKER:-mongodb://mongodb:27017}
  DB_NAME: ${DB_NAME:-business_reviews_analyzer}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
  # Docker/dev profile defaults (do not depend on local headed settings)
  SCRAPER_HEADLESS: ${SCRAPER_HEADLESS_DOCKER:-true}
  SCRAPER_INCOGNITO: ${SCRAPER_INCOGNITO_DOCKER:-false}
  SCRAPER_USER_DATA_DIR: ${SCRAPER_USER_DATA_DIR_DOCKER:-playwright-data-docker}
  SCRAPER_TRIPADVISOR_USER_DATA_DIR: ${SCRAPER_TRIPADVISOR_USER_DATA_DIR_DOCKER:-playwright-data-tripadvisor-docker}
  SCRAPER_REVIEWS_STRATEGY: ${SCRAPER_REVIEWS_STRATEGY:-interactive}
  SCRAPER_STEALTH_MODE: ${SCRAPER_STEALTH_MODE:-true}
  SCRAPER_HARDEN_HEADLESS: ${SCRAPER_HARDEN_HEADLESS:-true}
  SCRAPER_EXTRA_CHROMIUM_ARGS: ${SCRAPER_EXTRA_CHROMIUM_ARGS:-}
  SCRAPER_USE_XVFB_DOCKER: ${SCRAPER_USE_XVFB_DOCKER:-false}
  API_RELOAD_DOCKER: ${API_RELOAD_DOCKER:-false}
  WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-5}
  WORKER_IDLE_LOG_SECONDS: ${WORKER_IDLE_LOG_SECONDS:-60}
  WORKER_JOB_HEARTBEAT_SECONDS: ${WORKER_JOB_HEARTBEAT_SECONDS:-15}
  WORKER_PROGRESS_STALL_WARNING_SECONDS: ${WORKER_PROGRESS_STALL_WARNING_SECONDS:-90}
  ANALYSIS_AUTO_ENQUEUE_REPORT_JOB: ${ANALYSIS_AUTO_ENQUEUE_REPORT_JOB:-true}
  TRIPADVISOR_LOCAL_WORKER_BRIDGE_ENABLED: ${TRIPADVISOR_LOCAL_WORKER_BRIDGE_ENABLED:-false}
  TRIPADVISOR_LOCAL_WORKER_BRIDGE_URL: ${TRIPADVISOR_LOCAL_WORKER_BRIDGE_URL:-http://host.docker.internal:8765}
  TRIPADVISOR_LOCAL_WORKER_BRIDGE_TIMEOUT_SECONDS: ${TRIPADVISOR_LOCAL_WORKER_BRIDGE_TIMEOUT_SECONDS:-5}
  TRIPADVISOR_LOCAL_WORKER_AUTOSTART_ON_ENQUEUE: ${TRIPADVISOR_LOCAL_WORKER_AUTOSTART_ON_ENQUEUE:-false}

x-app-base: &app_base
  image: review-llm-app:latest
  restart: unless-stopped
  environment: *app_env
  depends_on:
    mongodb:
      condition: service_healthy
  volumes:
    - .:/app
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  mongodb:
    image: mongo:7
    container_name: bra-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    <<: *app_base
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bra-api
    network_mode: host
    environment:
      <<: *app_env
      MONGO_URI: ${MONGO_URI_APP_HOST:-mongodb://127.0.0.1:27017}
      TRIPADVISOR_LOCAL_WORKER_BRIDGE_URL: ${TRIPADVISOR_LOCAL_WORKER_BRIDGE_URL_APP:-http://127.0.0.1:8765}

  scraper-google-worker:
    <<: *app_base
    container_name: bra-scraper-google-worker
    profiles: ["worker"]
    environment:
      <<: *app_env
      WORKER_SCRAPE_QUEUE: scrape_google_maps
      WORKER_SCRAPE_SOURCE: google_maps
      SCRAPER_USER_DATA_DIR: ${SCRAPER_USER_DATA_DIR_GOOGLE_WORKER_DOCKER:-playwright-data-google-worker-docker}
    command: python -m src.workers.scraper_worker

  analysis-worker:
    <<: *app_base
    container_name: bra-analysis-worker
    profiles: ["worker"]
    command: python -m src.workers.analysis_worker

  report-worker:
    <<: *app_base
    container_name: bra-report-worker
    profiles: ["worker"]
    command: python -m src.workers.report_worker

volumes:
  mongo_data:
